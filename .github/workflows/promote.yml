name: promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable version to promote (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Bump all manifests
        run: bash scripts/bump-version.sh ${{ inputs.version }}
      - name: Pre-tag guard
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists — aborting promote"
            exit 1
          fi
      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin dev --tags
      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log --oneline "${PREV_TAG}..HEAD" | sed 's/^/- /' >> /tmp/release-notes.md
          else
            echo "## Release v${{ inputs.version }}" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log --oneline -20 | sed 's/^/- /' >> /tmp/release-notes.md
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --notes-file /tmp/release-notes.md
