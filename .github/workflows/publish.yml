name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v0.2.0 → latest
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*' # v0.2.0-beta.1 → beta
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Release tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Validate release ref
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          if [[ ! "${RELEASE_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\..+)?$ ]]; then
            echo "::error::Publish must run from a release tag, got '${RELEASE_REF}'"
            exit 1
          fi
      - run: npm ci
      - run: npm run -w @skillwiki/shared test
      - run: npm run -w skillwiki build
      - run: npm run -w skillwiki test
      - name: Determine npm tag
        id: tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          if [[ "${RELEASE_REF}" == *-beta* ]]; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate GitHub release notes
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${RELEASE_REF}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log --oneline "${PREV_TAG}..${RELEASE_REF}" | sed 's/^/- /' >> /tmp/release-notes.md
          else
            echo "## Release ${RELEASE_REF}" > /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log --oneline -20 "${RELEASE_REF}" | sed 's/^/- /' >> /tmp/release-notes.md
          fi
      - name: Ensure GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_REF}"
          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            echo "GitHub release already exists: ${RELEASE_URL}"
          else
            gh release create "$RELEASE_REF" --title "$RELEASE_REF" --notes-file /tmp/release-notes.md
          fi
          echo "GitHub Release: ${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
      - name: Publish to npm
        run: unset NODE_AUTH_TOKEN && npx -y npm@11 publish -w skillwiki --tag ${{ steps.tag.outputs.npm_tag }} --provenance --access public
