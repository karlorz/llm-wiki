name: publish

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run -w @skillwiki/shared test
      - run: npm run -w skillwiki build
      - run: npm run -w skillwiki test
      # Write a minimal .npmrc with ONLY the registry URL — no auth token.
      # This lets npm use OIDC trusted publishing (id-token: write) instead
      # of a stale NODE_AUTH_TOKEN secret from setup-node.
      - run: echo "registry=https://registry.npmjs.org" > "${{ runner.temp }}/.npmrc"
      - run: npm publish -w skillwiki --provenance --access public
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
