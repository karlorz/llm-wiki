name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v0.2.0 → latest
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*' # v0.2.0-beta.1 → beta
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Validate release ref
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\..+)?$ ]]; then
            echo "::error::Publish must run from a release tag, got '${GITHUB_REF_NAME}'"
            exit 1
          fi
      - run: npm ci
      - run: npm run -w @skillwiki/shared test
      - run: npm run -w skillwiki build
      - run: npm run -w skillwiki test
      - name: Determine npm tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta* ]]; then
            echo "npm_tag=beta" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
          fi
      - name: Publish to npm
        run: unset NODE_AUTH_TOKEN && npx -y npm@latest publish -w skillwiki --tag ${{ steps.tag.outputs.npm_tag }} --provenance --access public
