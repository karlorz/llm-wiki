name: publish

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run -w @skillwiki/shared test
      - run: npm run -w skillwiki build
      - run: npm run -w skillwiki test
      # setup-node injects NODE_AUTH_TOKEN=${GITHUB_TOKEN} which blocks OIDC.
      # Use npx to get npm 11+ (required for trusted publishing) and clear the token.
      - run: unset NODE_AUTH_TOKEN && npx -y npm@latest publish -w skillwiki --tag beta --provenance --access public
      - run: unset NODE_AUTH_TOKEN && npx -y npm@latest dist-tag add skillwiki@$(node -p "require('./packages/cli/package.json').version") latest
