name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Validate manifest consistency
        run: bash scripts/verify-manifests.sh
      - name: Verify plugin.json version bumped on main
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff HEAD~1 --name-only | grep -q 'packages/skills/.claude-plugin/plugin.json'; then
            echo "plugin.json version changed — OK"
          else
            echo "::warning::Push to main without plugin.json version bump — /plugin update won't detect changes"
          fi
      - name: Warn when stable release tag is missing
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' package.json | head -n 1)
          if echo "$VERSION" | grep -q '-'; then
            echo "Pre-release version $VERSION — stable tag guard skipped"
            exit 0
          fi
          TAG="v$VERSION"
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Stable release tag $TAG exists on origin"
          else
            echo "::warning::Stable version $VERSION is on main but $TAG is not on origin. Run scripts/release.sh $VERSION or push the tag to trigger publish.yml."
          fi

  build-and-test:
    needs: verify-manifests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run -w @skillwiki/shared test
      - run: npm run -w skillwiki build
      - run: npm run -w skillwiki test
      - name: install --dry-run smoke
        run: |
          node packages/cli/dist/cli.js install --dry-run --skills-root packages/skills --target ${{ runner.temp }}/skills-target
        shell: bash

  e2e-local:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run -w skillwiki build
      - name: Run e2e-local
        run: bash scripts/e2e-local.sh

  e2e-plugin:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SSH secret and run e2e-plugin
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::warning::SSH_PRIVATE_KEY not set — skipping e2e-plugin"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H sg01 >> ~/.ssh/known_hosts 2>/dev/null || true
          HOST_ENV=scripts/hosts/sg01.env bash scripts/e2e-plugin.sh
